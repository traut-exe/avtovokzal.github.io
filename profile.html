<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Профиль игрока</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }
        
        body {
            min-height: 100vh;
            background: #0a0a0a;
            background-image: 
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
                linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
            background-size: 30px 30px;
            color: white;
        }
        
        /* Верхняя панель */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #333333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 900;
            color: #666666;
            letter-spacing: 4px;
        }
        
        .logo span {
            color: #ffd700;
        }
        
        .back-btn {
            background: #2a2a2a;
            border: 2px solid #6a6a6a;
            border-radius: 30px;
            padding: 10px 25px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }
        
        .back-btn:hover {
            background: #3a3a3a;
            border-color: #ffd700;
            transform: translateX(-5px);
        }
        
        /* Основной контейнер */
        .profile-container {
            max-width: 1000px;
            margin: 90px auto 30px;
            padding: 0 20px;
        }
        
        /* Шапка профиля */
        .profile-header {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border-radius: 40px;
            padding: 40px;
            margin-bottom: 30px;
            border: 2px solid #333333;
            position: relative;
            overflow: hidden;
            animation: headerGlow 3s infinite;
        }
        
        @keyframes headerGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.2); }
        }
        
        .profile-header::before {
            content: "👤";
            position: absolute;
            bottom: -20px;
            right: -20px;
            font-size: 200px;
            opacity: 0.05;
            transform: rotate(10deg);
        }
        
        .avatar-section {
            display: flex;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        
        .avatar-large {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #2a2a2a;
            border: 5px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
        }
        
        .avatar-large:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-size: 48px;
            font-weight: 900;
            color: #ffd700;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        
        .user-login {
            font-size: 20px;
            color: #666666;
            margin-bottom: 20px;
            font-family: monospace;
        }
        
        .user-joined {
            color: #999999;
            font-size: 16px;
        }
        
        /* Сетка статистики */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #333333;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            animation: cardAppear 0.5s ease-out;
            animation-fill-mode: both;
        }
        
        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }
        .stat-card:nth-child(5) { animation-delay: 0.5s; }
        .stat-card:nth-child(6) { animation-delay: 0.6s; }
        
        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }
        
        .stat-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .stat-label {
            color: #999999;
            font-size: 16px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .stat-value {
            color: #ffd700;
            font-size: 48px;
            font-weight: 900;
            line-height: 1;
        }
        
        .stat-value.small {
            font-size: 32px;
        }
        
        .stat-desc {
            color: #666666;
            font-size: 14px;
            margin-top: 10px;
        }
        
        /* Секция аватаров */
        .avatars-section {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border-radius: 40px;
            padding: 30px;
            margin-top: 30px;
            border: 2px solid #333333;
        }
        
        .avatars-title {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .avatars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
        }
        
        .avatar-option {
            aspect-ratio: 1;
            background: #2a2a2a;
            border: 3px solid #444444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .avatar-option:hover {
            border-color: #ffd700;
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }
        
        .avatar-option.selected {
            border-color: #ffd700;
            box-shadow: 0 0 30px #ffd700;
        }
        
        /* Индикатор отчаяния */
        .despair-meter {
            background: linear-gradient(145deg, #2a1a1a, #1a0a0a);
            border: 3px solid #8b0000;
            border-radius: 40px;
            padding: 30px;
            margin-top: 30px;
            text-align: center;
        }
        
        .despair-title {
            color: #ff8888;
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 20px;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
            border: 2px solid #8b0000;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b0000, #ff4444);
            width: 0%;
            transition: width 0.5s;
            position: relative;
        }
        
        .progress-fill::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shine 2s infinite;
        }
        
        @keyframes shine {
            to { left: 100%; }
        }
        
        .despair-value {
            color: #ff8888;
            font-size: 48px;
            font-weight: 900;
            text-shadow: 0 0 20px #ff0000;
        }
        
        /* Кнопка выхода */
        .logout-btn {
            background: #4a2a2a;
            border: 3px solid #8b0000;
            border-radius: 60px;
            padding: 20px;
            width: 100%;
            font-size: 24px;
            font-weight: 900;
            color: #ffaaaa;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        
        .logout-btn:hover {
            background: #6a2a2a;
            border-color: #ff0000;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
        }
        
        .logout-btn:active {
            transform: translateY(3px);
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .avatar-section {
                flex-direction: column;
                text-align: center;
            }
            
            .user-name {
                font-size: 36px;
            }
            
            .stat-value {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <!-- Верхняя панель -->
    <div class="top-bar">
        <div class="logo">
            <span>🚌</span> ВОКЗАЛ №69
        </div>
        <button class="back-btn" onclick="window.location.href='index.html'">
            ← НА ГЛАВНУЮ
        </button>
    </div>

    <!-- Основной контент -->
    <div class="profile-container" id="profileContainer">
        <!-- Контент будет загружен через JS -->
    </div>

    <script src="auth-system.js"></script>
    <script>
        function loadProfile() {
            const user = window.userSystem?.currentUser;
            const container = document.getElementById('profileContainer');
            
            if (!user) {
                container.innerHTML = `
                    <div style="
                        background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
                        border-radius: 40px;
                        padding: 60px;
                        text-align: center;
                        border: 2px solid #333333;
                    ">
                        <div style="font-size: 80px; margin-bottom: 30px;">🚌</div>
                        <div style="color: #ff8888; font-size: 32px; font-weight: 900; margin-bottom: 20px;">
                            ВОЙДИТЕ В СИСТЕМУ
                        </div>
                        <button onclick="window.location.href='index.html'" style="
                            background: #4CAF50;
                            border: none;
                            border-radius: 40px;
                            padding: 20px 40px;
                            color: white;
                            font-weight: 700;
                            font-size: 20px;
                            cursor: pointer;
                        ">← НА ГЛАВНУЮ</button>
                    </div>
                `;
                return;
            }
            
            const stats = user.stats || {};
            const despair = Math.min((stats.rebornLevel || 0) * 5, 100);
            
            container.innerHTML = `
                <!-- Шапка профиля -->
                <div class="profile-header">
                    <div class="avatar-section">
                        <div class="avatar-large" id="currentAvatar">
                            ${user.avatar || '👤'}
                        </div>
                        <div class="user-info">
                            <div class="user-name">${escapeHtml(user.username)}</div>
                            <div class="user-login">@${escapeHtml(user.login)}</div>
                            <div class="user-joined">
                                Присоединился: ${new Date(user.registeredAt || Date.now()).toLocaleDateString('ru-RU', {
                                    year: 'numeric',
                                    month: 'long',
                                    day: 'numeric'
                                })}
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Статистика -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-label">Монеты</div>
                        <div class="stat-value">${stats.balance || 500}</div>
                        <div class="stat-desc">на балансе</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">🔄</div>
                        <div class="stat-label">Перерождений</div>
                        <div class="stat-value">${stats.rebornLevel || 0}</div>
                        <div class="stat-desc">из 18</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">📊</div>
                        <div class="stat-label">Разряд</div>
                        <div class="stat-value">${stats.playerLevel || 1}</div>
                        <div class="stat-desc">текущий уровень</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">👆</div>
                        <div class="stat-label">Кликов</div>
                        <div class="stat-value small">${stats.totalClicks || 0}</div>
                        <div class="stat-desc">всего сделано</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">🛒</div>
                        <div class="stat-label">Покупок</div>
                        <div class="stat-value small">${stats.totalPurchases || 0}</div>
                        <div class="stat-desc">в ларьке</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">🥟</div>
                        <div class="stat-label">Еды куплено</div>
                        <div class="stat-value small">${stats.foodPurchased || 0}</div>
                        <div class="stat-desc">перекусов</div>
                    </div>
                </div>
                
                <!-- Выбор аватара -->
                <div class="avatars-section">
                    <div class="avatars-title">🎭 ВЫБЕРИ АВАТАР</div>
                    <div class="avatars-grid" id="avatarsGrid"></div>
                </div>
                
                <!-- Индикатор отчаяния -->
                <div class="despair-meter">
                    <div class="despair-title">😫 УРОВЕНЬ ОТЧАЯНИЯ</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${despair}%;"></div>
                    </div>
                    <div class="despair-value">${despair}%</div>
                </div>
                
                <!-- Кнопка выхода -->
                <button class="logout-btn" id="logoutBtn">
                    🚪 ВЫЙТИ ИЗ АККАУНТА
                </button>
            `;
            
            // Загружаем аватары
            loadAvatars(user.avatar);
            
            // Обработчик выхода
            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                if (confirm('Точно выйти?')) {
                    window.userSystem.logout();
                }
            });
        }
        
        function loadAvatars(selectedAvatar) {
            const avatars = ['👨', '👩', '👨‍🦰', '👩‍🦰', '👴', '👵', '🧔', '🧑', '👨‍🦳', '👩‍🦳'];
            const grid = document.getElementById('avatarsGrid');
            if (!grid) return;
            
            grid.innerHTML = avatars.map(avatar => `
                <div class="avatar-option ${avatar === selectedAvatar ? 'selected' : ''}" 
                     onclick="selectAvatar('${avatar}')">
                    ${avatar}
                </div>
            `).join('');
        }
        
        function selectAvatar(avatar) {
            if (window.userSystem.changeAvatar(avatar)) {
                document.getElementById('currentAvatar').innerHTML = avatar;
                loadAvatars(avatar);
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Загружаем профиль
        setTimeout(loadProfile, 100);
        
        // Обновляем каждые 5 секунд
        setInterval(loadProfile, 5000);
    </script>
</body>
</html>
