<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль игрока</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }
        
        body {
            min-height: 100vh;
            background: #0a0a0a;
            background-image: 
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
                linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
            background-size: 30px 30px;
            color: white;
        }
        
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #1a1a1a;
            border-bottom: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 900;
            color: #666;
            letter-spacing: 2px;
        }
        
        .back-btn {
            background: #2a2a2a;
            border: 2px solid #666;
            border-radius: 30px;
            padding: 10px 25px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            border-color: #ffd700;
            transform: translateX(-5px);
        }
        
        .profile-container {
            max-width: 1000px;
            margin: 90px auto 30px;
            padding: 0 20px;
        }
        
        .profile-header {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border-radius: 40px;
            padding: 40px;
            margin-bottom: 30px;
            border: 2px solid #333;
            position: relative;
        }
        
        .avatar-section {
            display: flex;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        
        .avatar-large {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #2a2a2a;
            border: 5px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-size: 48px;
            font-weight: 900;
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .user-login {
            font-size: 20px;
            color: #666;
            margin-bottom: 10px;
            font-family: monospace;
        }
        
        .user-joined {
            color: #999;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #333;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            border-color: #ffd700;
            transform: translateY(-5px);
        }
        
        .stat-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .stat-label {
            color: #999;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .stat-value {
            color: #ffd700;
            font-size: 48px;
            font-weight: 900;
        }
        
        .stat-value.small {
            font-size: 32px;
        }
        
        .avatars-section {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border-radius: 40px;
            padding: 30px;
            margin-top: 30px;
            border: 2px solid #333;
        }
        
        .avatars-title {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .avatars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
        }
        
        .avatar-option {
            aspect-ratio: 1;
            background: #2a2a2a;
            border: 3px solid #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .avatar-option:hover {
            border-color: #ffd700;
            transform: scale(1.1);
        }
        
        .avatar-option.selected {
            border-color: #ffd700;
            box-shadow: 0 0 30px #ffd700;
        }
        
        .despair-meter {
            background: linear-gradient(145deg, #2a1a1a, #1a0a0a);
            border: 3px solid #8b0000;
            border-radius: 40px;
            padding: 30px;
            margin-top: 30px;
            text-align: center;
        }
        
        .despair-title {
            color: #ff8888;
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 20px;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
            border: 2px solid #8b0000;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b0000, #ff4444);
            width: 0%;
            transition: width 0.5s;
        }
        
        .despair-value {
            color: #ff8888;
            font-size: 48px;
            font-weight: 900;
        }
        
        .logout-btn {
            background: #4a2a2a;
            border: 3px solid #8b0000;
            border-radius: 60px;
            padding: 20px;
            width: 100%;
            font-size: 24px;
            font-weight: 900;
            color: #ffaaaa;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 30px;
        }
        
        .logout-btn:hover {
            background: #6a2a2a;
            border-color: #ff0000;
            color: white;
        }
        
        .error-message {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border-radius: 40px;
            padding: 60px;
            text-align: center;
            border: 2px solid #333;
        }
        
        .error-message h2 {
            color: #ff8888;
            font-size: 32px;
            margin: 20px 0;
        }
        
        .error-message button {
            background: #4CAF50;
            border: none;
            border-radius: 40px;
            padding: 20px 40px;
            color: white;
            font-weight: 700;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">🚌 ВОКЗАЛ №69</div>
        <button class="back-btn" onclick="window.location.href='index.html'">← НА ГЛАВНУЮ</button>
    </div>

    <div class="profile-container" id="profileContainer"></div>

    <script src="auth-system.js"></script>
    <script>
        function loadProfile() {
            const user = window.userSystem?.currentUser;
            const container = document.getElementById('profileContainer');
            
            if (!user) {
                container.innerHTML = `
                    <div class="error-message">
                        <div style="font-size: 80px;">🚌</div>
                        <h2>ВОЙДИТЕ В СИСТЕМУ</h2>
                        <button onclick="window.location.href='index.html'">← НА ГЛАВНУЮ</button>
                    </div>
                `;
                return;
            }
            
            const stats = user.stats || {};
            const despair = Math.min((stats.rebornLevel || 0) * 5, 100);
            
            container.innerHTML = `
                <div class="profile-header">
                    <div class="avatar-section">
                        <div class="avatar-large" id="currentAvatar">${user.avatar || '👤'}</div>
                        <div class="user-info">
                            <div class="user-name">${escapeHtml(user.username)}</div>
                            <div class="user-login">@${escapeHtml(user.login)}</div>
                            <div class="user-joined">
                                Присоединился: ${new Date().toLocaleDateString('ru-RU')}
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-label">Монеты</div>
                        <div class="stat-value">${stats.balance || 500}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🔄</div>
                        <div class="stat-label">Перерождений</div>
                        <div class="stat-value">${stats.rebornLevel || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📊</div>
                        <div class="stat-label">Разряд</div>
                        <div class="stat-value">${stats.playerLevel || 1}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">👆</div>
                        <div class="stat-label">Кликов</div>
                        <div class="stat-value small">${stats.totalClicks || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🛒</div>
                        <div class="stat-label">Покупок</div>
                        <div class="stat-value small">${stats.totalPurchases || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🥟</div>
                        <div class="stat-label">Еды</div>
                        <div class="stat-value small">${stats.foodPurchased || 0}</div>
                    </div>
                </div>
                
                <div class="avatars-section">
                    <div class="avatars-title">🎭 ВЫБЕРИ АВАТАР</div>
                    <div class="avatars-grid" id="avatarsGrid"></div>
                </div>
                
                <div class="despair-meter">
                    <div class="despair-title">😫 УРОВЕНЬ ОТЧАЯНИЯ</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${despair}%;"></div>
                    </div>
                    <div class="despair-value">${despair}%</div>
                </div>
                
                <button class="logout-btn" id="logoutBtn">🚪 ВЫЙТИ ИЗ АККАУНТА</button>
            `;
            
            loadAvatars(user.avatar);
            
            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                if (confirm('Точно выйти?')) {
                    window.userSystem.logout();
                }
            });
        }
        
        function loadAvatars(selected) {
            const avatars = ['👨', '👩', '👨‍🦰', '👩‍🦰', '👴', '👵', '🧔', '🧑', '👨‍🦳', '👩‍🦳'];
            const grid = document.getElementById('avatarsGrid');
            if (!grid) return;
            
            grid.innerHTML = avatars.map(a => `
                <div class="avatar-option ${a === selected ? 'selected' : ''}" 
                     onclick="window.userSystem.changeAvatar('${a}'); loadProfile();">
                    ${a}
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        setTimeout(loadProfile, 100);
        setInterval(loadProfile, 5000);
    </script>
</body>
</html>
