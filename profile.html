<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Профиль игрока</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }
        
        body {
            min-height: 100vh;
            background: #0a0a0a;
            background-image: 
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
                linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
            background-size: 30px 30px;
            color: white;
        }
        
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #1a1a1a;
            border-bottom: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }
        
        .logo {
            font-size: clamp(16px, 4vw, 24px);
            font-weight: 900;
            color: #666;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        
        .back-btn {
            background: #2a2a2a;
            border: 2px solid #666;
            border-radius: 30px;
            padding: 10px 20px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: clamp(12px, 3vw, 16px);
            white-space: nowrap;
        }
        
        .back-btn:hover {
            border-color: #ffd700;
            transform: translateX(-5px);
        }
        
        .profile-container {
            max-width: 1000px;
            margin: 90px auto 30px;
            padding: 0 15px;
        }
        
        .profile-header {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border-radius: 30px;
            padding: clamp(20px, 5vw, 40px);
            margin-bottom: 20px;
            border: 2px solid #333;
        }
        
        .avatar-section {
            display: flex;
            align-items: center;
            gap: clamp(15px, 4vw, 40px);
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .avatar-large {
            width: min(150px, 30vw);
            height: min(150px, 30vw);
            border-radius: 50%;
            background: #2a2a2a;
            border: 5px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(80px, 15vw);
            overflow: hidden;
        }
        
        .avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .user-info {
            flex: 1;
            min-width: 200px;
            text-align: center;
        }
        
        .user-name {
            font-size: clamp(24px, 6vw, 48px);
            font-weight: 900;
            color: #ffd700;
            margin-bottom: 5px;
            word-break: break-word;
        }
        
        .user-login {
            font-size: clamp(14px, 3vw, 20px);
            color: #666;
            margin-bottom: 5px;
            font-family: monospace;
        }
        
        .user-joined {
            color: #999;
            font-size: clamp(12px, 2.5vw, 14px);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border-radius: 25px;
            padding: clamp(15px, 4vw, 30px);
            border: 2px solid #333;
            transition: all 0.3s;
            text-align: center;
        }
        
        .stat-card:hover {
            border-color: #ffd700;
            transform: translateY(-5px);
        }
        
        .stat-icon {
            font-size: clamp(30px, 6vw, 48px);
            margin-bottom: 10px;
        }
        
        .stat-label {
            color: #999;
            font-size: clamp(12px, 2.5vw, 16px);
            margin-bottom: 5px;
        }
        
        .stat-value {
            color: #ffd700;
            font-size: clamp(24px, 5vw, 48px);
            font-weight: 900;
        }
        
        .avatars-section {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border-radius: 30px;
            padding: clamp(15px, 4vw, 30px);
            margin-top: 20px;
            border: 2px solid #333;
        }
        
        .avatars-title {
            font-size: clamp(18px, 4vw, 24px);
            color: #ffd700;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .avatars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .avatar-option {
            aspect-ratio: 1;
            background: #2a2a2a;
            border: 3px solid #444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(20px, 4vw, 40px);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .avatar-option:hover {
            border-color: #ffd700;
            transform: scale(1.1);
        }
        
        .avatar-option.selected {
            border-color: #ffd700;
            box-shadow: 0 0 30px #ffd700;
        }
        
        .upload-btn {
            background: #3a3a3a;
            border: 2px solid #666;
            border-radius: 40px;
            padding: 15px;
            width: 100%;
            color: white;
            font-weight: 700;
            font-size: clamp(14px, 3vw, 18px);
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .upload-btn:hover {
            background: #4a4a4a;
            border-color: #ffd700;
        }
        
        .logout-btn {
            background: #4a2a2a;
            border: 3px solid #8b0000;
            border-radius: 60px;
            padding: 15px;
            width: 100%;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: 900;
            color: #ffaaaa;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .logout-btn:hover {
            background: #6a2a2a;
            border-color: #ff0000;
            color: white;
        }
        
        .error-message {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            border: 2px solid #333;
        }
        
        .error-message h2 {
            color: #ff8888;
            font-size: clamp(20px, 5vw, 32px);
            margin: 20px 0;
        }
        
        .error-message button {
            background: #4CAF50;
            border: none;
            border-radius: 40px;
            padding: 15px 30px;
            color: white;
            font-weight: 700;
            font-size: clamp(14px, 3vw, 18px);
            cursor: pointer;
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">🚌 ВОКЗАЛ №69</div>
        <button class="back-btn" onclick="window.location.href='index.html'">← НА ГЛАВНУЮ</button>
    </div>

    <div class="profile-container" id="profileContainer"></div>

    <input type="file" id="fileInput" accept="image/*">

    <script src="auth-system.js"></script>
    <script>
        function loadProfile() {
            const user = window.userSystem?.currentUser;
            const container = document.getElementById('profileContainer');
            
            if (!user) {
                container.innerHTML = `
                    <div class="error-message">
                        <div style="font-size: min(80px, 20vw);">🚌</div>
                        <h2>ВОЙДИТЕ В СИСТЕМУ</h2>
                        <button onclick="window.location.href='index.html'">← НА ГЛАВНУЮ</button>
                    </div>
                `;
                return;
            }
            
            const stats = user.stats || {};
            
            container.innerHTML = `
                <div class="profile-header">
                    <div class="avatar-section">
                        <div class="avatar-large" id="currentAvatar">
                            ${user.avatar ? 
                                (user.avatar.startsWith('data:') ? 
                                    `<img src="${user.avatar}">` : 
                                    `<div style="font-size: inherit;">${user.avatar}</div>`) 
                                : '👤'}
                        </div>
                        <div class="user-info">
                            <div class="user-name">${escapeHtml(user.username)}</div>
                            <div class="user-login">@${escapeHtml(user.login)}</div>
                            <div class="user-joined">
                                Присоединился: ${new Date().toLocaleDateString('ru-RU')}
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-label">Монеты</div>
                        <div class="stat-value">${Math.floor(stats.balance || 500)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🔄</div>
                        <div class="stat-label">Перерождений</div>
                        <div class="stat-value">${stats.rebornLevel || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📊</div>
                        <div class="stat-label">Разряд</div>
                        <div class="stat-value">${stats.playerLevel || 1}</div>
                    </div>
                </div>
                
                <div class="avatars-section">
                    <div class="avatars-title">🎭 ВЫБЕРИ АВАТАР</div>
                    <div class="avatars-grid" id="avatarsGrid"></div>
                    <button class="upload-btn" id="uploadAvatarBtn">
                        📁 ЗАГРУЗИТЬ СВОЁ ФОТО
                    </button>
                </div>
                
                <button class="logout-btn" id="logoutBtn">🚪 ВЫЙТИ ИЗ АККАУНТА</button>
            `;
            
            loadAvatars(user.avatar);
            
            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                if (confirm('Точно выйти?')) {
                    window.userSystem.logout();
                }
            });

            document.getElementById('uploadAvatarBtn')?.addEventListener('click', () => {
                document.getElementById('fileInput').click();
            });
        }
        
        function loadAvatars(selected) {
            const avatars = ['👨', '👩', '👨‍🦰', '👩‍🦰', '👴', '👵', '🧔', '🧑', '👨‍🦳', '👩‍🦳'];
            const grid = document.getElementById('avatarsGrid');
            if (!grid) return;
            
            grid.innerHTML = avatars.map(a => {
                const isSelected = a === selected || (typeof selected === 'string' && !selected.startsWith('data:') && a === selected);
                return `
                    <div class="avatar-option ${isSelected ? 'selected' : ''}" 
                         onclick="window.userSystem.changeAvatar('${a}'); loadProfile();">
                        ${a}
                    </div>
                `;
            }).join('');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Обработка загрузки файла
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                try {
                    await window.userSystem.uploadAvatar(file);
                    loadProfile();
                    alert('✅ Аватар успешно загружен!');
                } catch (error) {
                    alert('❌ Ошибка загрузки аватара');
                }
            }
        });
        
        // Загружаем профиль и обновляем каждую секунду
        function updateProfile() {
            loadProfile();
        }
        
        setTimeout(updateProfile, 100);
        setInterval(updateProfile, 1000);
    </script>
</body>
</html>
