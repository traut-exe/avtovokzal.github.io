<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Профиль игрока</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }
        
        body {
            min-height: 100vh;
            background: #0a0a0a;
            background-image: 
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
                linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
            background-size: 30px 30px;
            color: white;
        }
        
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #1a1a1a;
            border-bottom: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }
        
        .logo {
            font-size: clamp(16px, 4vw, 24px);
            font-weight: 900;
            color: #666;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        
        .back-btn {
            background: #2a2a2a;
            border: 2px solid #666;
            border-radius: 30px;
            padding: 10px 20px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: clamp(12px, 3vw, 16px);
            white-space: nowrap;
        }
        
        .back-btn:hover {
            border-color: #ffd700;
            transform: translateX(-5px);
        }
        
        .profile-container {
            max-width: 600px;
            margin: 90px auto 30px;
            padding: 0 15px;
        }
        
        .profile-header {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border-radius: 30px;
            padding: clamp(20px, 5vw, 40px);
            margin-bottom: 20px;
            border: 2px solid #333;
        }
        
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .avatar-large {
            width: min(200px, 50vw);
            height: min(200px, 50vw);
            border-radius: 50%;
            background: #2a2a2a;
            border: 5px solid #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(80px, 20vw);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }
        
        .avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .user-info {
            text-align: center;
            width: 100%;
        }
        
        .user-name {
            font-size: clamp(28px, 6vw, 48px);
            font-weight: 900;
            color: #ffd700;
            margin-bottom: 5px;
            word-break: break-word;
        }
        
        .user-login {
            font-size: clamp(16px, 3vw, 20px);
            color: #666;
            margin-bottom: 10px;
            font-family: monospace;
        }
        
        .user-joined {
            color: #999;
            font-size: clamp(12px, 2.5vw, 14px);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border-radius: 25px;
            padding: clamp(15px, 4vw, 30px);
            border: 2px solid #333;
            transition: all 0.3s;
            text-align: center;
        }
        
        .stat-card:hover {
            border-color: #ffd700;
            transform: translateY(-5px);
        }
        
        .stat-icon {
            font-size: clamp(30px, 6vw, 48px);
            margin-bottom: 10px;
        }
        
        .stat-label {
            color: #999;
            font-size: clamp(12px, 2.5vw, 16px);
            margin-bottom: 5px;
        }
        
        .stat-value {
            color: #ffd700;
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 900;
        }
        
        .upload-section {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border-radius: 30px;
            padding: clamp(20px, 4vw, 30px);
            margin-top: 20px;
            border: 2px solid #333;
            text-align: center;
        }
        
        .upload-title {
            font-size: clamp(18px, 4vw, 24px);
            color: #ffd700;
            margin-bottom: 20px;
        }
        
        .upload-btn {
            background: #3a3a3a;
            border: 2px solid #666;
            border-radius: 40px;
            padding: 18px;
            width: 100%;
            color: white;
            font-weight: 700;
            font-size: clamp(16px, 4vw, 20px);
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        
        .upload-btn:hover {
            background: #4a4a4a;
            border-color: #ffd700;
            transform: scale(1.02);
        }
        
        .upload-hint {
            color: #666;
            font-size: clamp(12px, 2.5vw, 14px);
            margin-top: 10px;
        }
        
        .logout-btn {
            background: #4a2a2a;
            border: 3px solid #8b0000;
            border-radius: 60px;
            padding: 18px;
            width: 100%;
            font-size: clamp(18px, 4vw, 22px);
            font-weight: 900;
            color: #ffaaaa;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .logout-btn:hover {
            background: #6a2a2a;
            border-color: #ff0000;
            color: white;
            transform: translateY(-2px);
        }
        
        .error-message {
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            border: 2px solid #333;
        }
        
        .error-message h2 {
            color: #ff8888;
            font-size: clamp(20px, 5vw, 32px);
            margin: 20px 0;
        }
        
        .error-message button {
            background: #4CAF50;
            border: none;
            border-radius: 40px;
            padding: 15px 30px;
            color: white;
            font-weight: 700;
            font-size: clamp(14px, 3vw, 18px);
            cursor: pointer;
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">🚌 ВОКЗАЛ №69</div>
        <button class="back-btn" onclick="window.location.href='index.html'">← НА ГЛАВНУЮ</button>
    </div>

    <div class="profile-container" id="profileContainer"></div>

    <input type="file" id="fileInput" accept="image/*">

    <script src="auth-system.js"></script>
    <script>
        function loadProfile() {
            const user = window.userSystem?.currentUser;
            const container = document.getElementById('profileContainer');
            
            if (!user) {
                container.innerHTML = `
                    <div class="error-message">
                        <div style="font-size: min(80px, 20vw);">🚌</div>
                        <h2>ВОЙДИТЕ В СИСТЕМУ</h2>
                        <button onclick="window.location.href='index.html'">← НА ГЛАВНУЮ</button>
                    </div>
                `;
                return;
            }
            
            const stats = user.stats || {};
            const balance = Math.floor(Number(stats.balance) || 500);
            
            container.innerHTML = `
                <div class="profile-header">
                    <div class="avatar-section">
                        <div class="avatar-large" id="currentAvatar">
                            ${user.avatar ? 
                                `<img src="${user.avatar}" alt="avatar">` : 
                                '<div style="font-size: 80px;">👤</div>'}
                        </div>
                        <div class="user-info">
                            <div class="user-name">${escapeHtml(user.username)}</div>
                            <div class="user-login">@${escapeHtml(user.login)}</div>
                            <div class="user-joined">
                                Присоединился: ${new Date(user.registeredAt || Date.now()).toLocaleDateString('ru-RU')}
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-label">Монеты</div>
                        <div class="stat-value">${balance}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🔄</div>
                        <div class="stat-label">Перерождений</div>
                        <div class="stat-value">${stats.rebornLevel || 0}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📊</div>
                        <div class="stat-label">Разряд</div>
                        <div class="stat-value">${stats.playerLevel || 1}</div>
                    </div>
                </div>
                
                <div class="upload-section">
                    <div class="upload-title">📸 ФОТО ПРОФИЛЯ</div>
                    <button class="upload-btn" id="uploadAvatarBtn">
                        📁 ЗАГРУЗИТЬ ФОТО
                    </button>
                    <div class="upload-hint">
                        Поддерживаются JPG, PNG, GIF до 5MB
                    </div>
                </div>
                
                <button class="logout-btn" id="logoutBtn">
                    🚪 ВЫЙТИ ИЗ АККАУНТА
                </button>
            `;
            
            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                if (confirm('Точно выйти?')) {
                    window.userSystem.logout();
                }
            });

            document.getElementById('uploadAvatarBtn')?.addEventListener('click', () => {
                document.getElementById('fileInput').click();
            });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Обработка загрузки файла
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            // Проверка размера (5MB максимум)
            if (file.size > 5 * 1024 * 1024) {
                alert('❌ Файл слишком большой! Максимум 5MB');
                return;
            }
            
            // Проверка типа файла
            if (!file.type.startsWith('image/')) {
                alert('❌ Можно загружать только изображения');
                return;
            }
            
            try {
                await window.userSystem.uploadAvatar(file);
                loadProfile(); // Перезагружаем профиль
                alert('✅ Аватар успешно загружен!');
            } catch (error) {
                alert('❌ Ошибка загрузки: ' + error);
            }
            
            // Очищаем input
            e.target.value = '';
        });
        
        // Загружаем профиль и обновляем каждую секунду
        function updateProfile() {
            loadProfile();
        }
        
        setTimeout(updateProfile, 100);
        setInterval(updateProfile, 1000);
    </script>
</body>
</html>
